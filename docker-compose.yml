services:

  db:
    image: postgres:16
    container_name: firmeza_db
    environment:
      POSTGRES_DB:       firmeza_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: YOUR_PASSWORD   # cambiar antes de usar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: src/Firmeza.Web/Dockerfile
    container_name: firmeza_web
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=firmeza_db;Username=postgres;Password=YOUR_PASSWORD"
    depends_on:
      - db

volumes:
  postgres_data:
